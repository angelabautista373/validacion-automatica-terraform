name: Terraform Deploy (LocalStack)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Iniciar LocalStack
        run: |
          docker run -d \
            --name localstack \
            -p 4566:4566 \
            -e SERVICES=s3 \
            -e DEBUG=1 \
            -e LS_LOG=warn \
            -e LOCALSTACK _AUTH_TOKEN= \
            localstack/localstack:latest

      - name: Esperar a LocalStack
        run: |
          for i in {1..10}; do
          curl http://localhost:4566/health | grep '"s3": "running"' && break
          echo "Esperando LocalStack..."
          sleep 15
        done

      - name: Inicializar Terraform
        run: terraform init

      - name: Plan Terraform
        run: terraform plan

      - name: Apply Terraform
        run: terraform apply -auto-approve
